<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindsave</title>
    <link rel="stylesheet" href="tracker.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />

</head>

<body>
    <div class="chart-container" style="position: relative; margin-bottom: 25px; padding: 15px; background: rgba(0,0,0,0.15); border-radius: 12px;">
    <canvas id="expenseChart"></canvas>
</div>
    <div class="container">
        <header>
            <div class="logo">
                <i class='bx bx-wallet-toggle'></i> 
                <h2>Mindsave</h2>
            </div>

            <div class="balance-card">
                <p>Total Balance</p>
                <h1 id="total-balance">₦0.00</h1>
            </div>

            <div class="summary-cards">
                <div class="card income">
                    <i class='bx bx-trending-up'></i>
                    <div>
                        <small>Income</small>
                        <h3 id="total-income">₦0.00</h3>
                    </div>
                </div>
                <div class="card expense">
                    <i class='bx bx-trending-down'></i>
                    <div>
                        <small>Expenses</small>
                        <h3 id="total-expense">₦0.00</h3>
                    </div>
                </div>
            </div>

            <div class="budget-progress-container">
                <div class="budget-header">
                    <span class="budget-title"><i class='bx bx-target-lock'></i> Monthly Budget</span>
                    <span id="budget-percentage">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="budget-progress-fill" class="progress-fill" style="width: 0%"></div>
                </div>
                <div class="budget-limits">
                    <span id="budget-spent">Spent: ₦0.00</span>
                    <span id="budget-cap">Limit: ₦0.00</span>
                </div>
                <div class="budget-input-group">
                    <input type="number" id="budget-limit-input" placeholder="Set Monthly Limit (₦)" />
                    <button id="set-budget-btn" class="btn btn-sm">Set</button>
                </div>
            </div>

            <div class="action-panel">
                <button id="export-report-btn" class="btn btn-secondary-outline"><i class='bx bx-download'></i> Export
                    CSV</button>
                <button id="clear-all-btn" class="btn btn-danger-outline">Reset Dashboard</button>
            </div>
        </header>

        <main>
            <section class="form-section">
                <h3>Add New Transaction</h3>
                <form id="transaction-form">
                    <div class="form-control">
                        <label for="description">Description</label>
                        <input type="text" id="description" placeholder="e.g., Groceries, Salary, Coffee" required />
                    </div>
                    <div class="transaction-check-box">
                        <div class="transaction-check">
                            <input type="radio" name="transactionType" id="income" value="income" />
                            <label for="income">Income</label>
                        </div>
                        <div class="transaction-check">
                            <input type="radio" name="transactionType" id="expense" value="expense" />
                            <label for="expense">Expense</label>
                        </div>
                    </div>
                    <div class="form-control">
                        <label for="amount">Amount</label>
                        <input type="number" step="0.01" id="amount" placeholder="2000 or 50000" required />
                    </div>
                    <button type="submit" class="btn">Add Transaction</button>
                </form>
            </section>

            <section class="history-section">
                <div class="history-header">
                    <h3>Transaction History</h3>
                    <div class="filter-tabs">
                        <button class="tab-btn active" data-filter="all">All</button>
                        <button class="tab-btn" data-filter="income">Income</button>
                        <button class="tab-btn" data-filter="expense">Expenses</button>
                    </div>
                </div>

                <div class="search-filter-bar">
                    <div class="search-box">
                        <i class='bx bx-search'></i>
                        <input type="text" id="search-input" placeholder="Search transactions..." />
                    </div>
                    <div class="date-box">
                        <i class='bx bx-calendar'></i>
                        <input type="date" id="date-filter-input" />
                    </div>
                </div>

                <ul id="transaction-list" class="list">
                </ul>
            </section>
        </main>
    </div>

    <div id="confirmation-modal" class="modal-overlay">
        <div class="modal">
            <h3>Are you absolutely sure?</h3>
            <p>This will permanently wipe all your transaction logs and reset your balance. This action cannot be
                undone.</p>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
                <button id="modal-confirm" class="btn btn-danger">Yes, Clear All</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="index.js"></script>
</body>

</html>
